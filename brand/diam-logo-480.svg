<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <rect width="480" height="480" fill="#131313"/>

  <!-- Soft outer glow halo -->
  <polygon
    points="240,30 450,240 240,450 30,240"
    fill="none"
    stroke="#00ff41"
    stroke-width="2"
    opacity="0.10"/>

  <!-- Outer diamond — the vault frame -->
  <polygon
    points="240,52 428,240 240,428 52,240"
    fill="none"
    stroke="#00ff41"
    stroke-width="10"
    stroke-linejoin="miter"/>

  <!-- Inner diamond echo — depth, hints at "sealed inside" -->
  <polygon
    points="240,116 364,240 240,364 116,240"
    fill="none"
    stroke="#00ff41"
    stroke-width="1.5"
    opacity="0.32"/>

  <!-- Solid redaction strip — the seal cutting through -->
  <rect x="78" y="218" width="324" height="44" fill="#00ff41"/>

  <!-- Three redaction blocks: classic "REDACTED ▄▄▄" pattern -->
  <rect x="118" y="232" width="62" height="16" fill="#131313"/>
  <rect x="208" y="232" width="62" height="16" fill="#131313"/>
  <rect x="298" y="232" width="62" height="16" fill="#131313"/>

  <!-- Tiny live-dot, top-right corner of strip — subtle "active" cue -->
  <circle cx="392" cy="240" r="3" fill="#131313"/>
</svg>
